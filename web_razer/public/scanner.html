<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razer HID Scanner & Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px #00ff00; }
        .panel {
            background: #111;
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .panel h2 { color: #00ff00; margin-bottom: 10px; font-size: 1.1em; }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        button:hover { background: #00cc00; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        .btn-danger { background: #ff4444; }
        .btn-warning { background: #ffaa00; }
        .log {
            background: #000;
            border: 1px solid #333;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85em;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
        .info { color: #00aaff; }
        .warn { color: #ffaa00; }
        .device-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
        }
        .collection-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.85em;
        }
        .collection-card.active { border-color: #00ff00; }
        .quick-test { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .quick-test input {
            background: #222;
            border: 1px solid #00ff00;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            width: 80px;
            text-align: center;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #1a1a1a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Razer HID Scanner & Quick Tester</h1>

        <!-- Connection Panel -->
        <div class="panel">
            <h2>1. Device Connection</h2>
            <button onclick="scanDevices()">Scan All Razer Devices</button>
            <button onclick="disconnectAll()" class="btn-danger">Disconnect All</button>
            <div id="deviceList" class="device-info" style="margin-top: 15px;"></div>
        </div>

        <!-- Collections Panel -->
        <div class="panel">
            <h2>2. HID Collections (Select the correct one)</h2>
            <div id="collectionsInfo"></div>
        </div>

        <!-- Quick Test Panel -->
        <div class="panel">
            <h2>3. Quick DPI Test (400 ↔ 1600)</h2>
            <div class="quick-test">
                <button onclick="quickSetDPI(400)" id="btn400">Set DPI 400</button>
                <button onclick="quickSetDPI(1600)" id="btn1600">Set DPI 1600</button>
                <button onclick="quickSetDPI(800)" id="btn800">Set DPI 800</button>
                <span>Custom:</span>
                <input type="number" id="customDpi" value="1000" min="100" max="30000">
                <button onclick="quickSetDPI(parseInt(document.getElementById('customDpi').value))">Apply</button>
            </div>
            <div class="quick-test" style="margin-top: 10px;">
                <span>Report ID:</span>
                <input type="number" id="reportId" value="0" min="0" max="255">
                <span>Collection Index:</span>
                <input type="number" id="collectionIdx" value="0" min="0" max="10">
                <button onclick="testAllReportIds()" class="btn-warning">Brute Force Test (0-10)</button>
            </div>
        </div>

        <!-- Raw Command Panel -->
        <div class="panel">
            <h2>4. Send Raw Command</h2>
            <div style="margin-bottom: 10px;">
                <span>Preset:</span>
                <button onclick="loadPreset('dpi1000')">DPI 1000</button>
                <button onclick="loadPreset('dpi400')">DPI 400</button>
                <button onclick="loadPreset('poll1000')">Poll 1000Hz</button>
                <button onclick="loadPreset('poll8000')">Poll 8000Hz</button>
            </div>
            <textarea id="rawCmd" style="width:100%; height:60px; background:#222; color:#0f0; border:1px solid #333; padding:10px; font-family:monospace;"
>00 00 00 00 00 0a 04 06 01 01 01 00 03 e8 03 e8 00 00</textarea>
            <button onclick="sendRawCommand()">Send Command</button>
            <button onclick="sendAsOutput()">Send as Output Report</button>
        </div>

        <!-- Log Panel -->
        <div class="panel">
            <h2>Communication Log</h2>
            <button onclick="clearLog()">Clear</button>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        const RAZER_VID = 0x1532;
        let devices = [];
        let activeDevice = null;
        let activeCollection = null;

        function log(msg, type = 'info') {
            const el = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            el.innerHTML += `<span class="${type}">[${time}] ${msg}</span>\n`;
            el.scrollTop = el.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function scanDevices() {
            try {
                log('Requesting all Razer HID devices...', 'info');

                // Request device with Razer VID
                const requestedDevices = await navigator.hid.requestDevice({
                    filters: [{ vendorId: RAZER_VID }]
                });

                if (requestedDevices.length === 0) {
                    log('No device selected', 'error');
                    return;
                }

                // Get all already-permitted devices
                const allDevices = await navigator.hid.getDevices();
                devices = allDevices.filter(d => d.vendorId === RAZER_VID);

                log(`Found ${devices.length} Razer device(s)`, 'success');

                // Display device info
                const container = document.getElementById('deviceList');
                container.innerHTML = '';

                for (let i = 0; i < devices.length; i++) {
                    const d = devices[i];
                    const card = document.createElement('div');
                    card.className = 'collection-card';
                    card.innerHTML = `
                        <strong>Device ${i}: ${d.productName}</strong><br>
                        VID: 0x${d.vendorId.toString(16).toUpperCase()}<br>
                        PID: 0x${d.productId.toString(16).toUpperCase()}<br>
                        Opened: ${d.opened}<br>
                        Collections: ${d.collections.length}<br>
                        <button onclick="selectDevice(${i})">Select & Open</button>
                    `;
                    container.appendChild(card);
                }

            } catch (e) {
                log(`Error: ${e.message}`, 'error');
            }
        }

        async function selectDevice(idx) {
            try {
                activeDevice = devices[idx];

                if (!activeDevice.opened) {
                    await activeDevice.open();
                    log(`Opened device: ${activeDevice.productName}`, 'success');
                }

                // Listen for input reports
                activeDevice.oninputreport = (e) => {
                    const data = new Uint8Array(e.data.buffer);
                    const hex = Array.from(data).map(b => b.toString(16).padStart(2, '0')).join(' ');
                    log(`INPUT Report ${e.reportId}: ${hex}`, 'info');
                };

                // Display collections
                displayCollections();

            } catch (e) {
                log(`Failed to open: ${e.message}`, 'error');
            }
        }

        function displayCollections() {
            if (!activeDevice) return;

            const container = document.getElementById('collectionsInfo');
            container.innerHTML = `<p>Device: <strong>${activeDevice.productName}</strong> - ${activeDevice.collections.length} collection(s)</p>`;

            const table = document.createElement('table');
            table.innerHTML = `
                <tr>
                    <th>Idx</th>
                    <th>Usage Page</th>
                    <th>Usage</th>
                    <th>Input Reports</th>
                    <th>Output Reports</th>
                    <th>Feature Reports</th>
                    <th>Action</th>
                </tr>
            `;

            activeDevice.collections.forEach((col, idx) => {
                const inputReports = col.inputReports?.map(r => `ID:${r.reportId} (${r.items?.length || 0} items)`).join(', ') || 'None';
                const outputReports = col.outputReports?.map(r => `ID:${r.reportId}`).join(', ') || 'None';
                const featureReports = col.featureReports?.map(r => `ID:${r.reportId}`).join(', ') || 'None';

                const usagePage = `0x${col.usagePage.toString(16).toUpperCase()}`;
                const usage = `0x${col.usage.toString(16).toUpperCase()}`;

                // Identify likely control interface
                let highlight = '';
                // Usage Page 0x01 = Generic Desktop, 0x0C = Consumer
                // Usage Page 0xFF00+ = Vendor-defined (likely control)
                if (col.usagePage >= 0xFF00) {
                    highlight = ' style="background:#003300"';
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${idx}</td>
                    <td>${usagePage}</td>
                    <td>${usage}</td>
                    <td>${inputReports}</td>
                    <td>${outputReports}</td>
                    <td>${featureReports}</td>
                    <td><button onclick="selectCollection(${idx})">Use</button></td>
                `;
                if (col.usagePage >= 0xFF00) {
                    row.style.background = '#003300';
                }
                table.appendChild(row);
            });

            container.appendChild(table);

            log(`Collections displayed. Look for UsagePage 0xFF00+ (vendor-defined) for control interface.`, 'warn');
        }

        function selectCollection(idx) {
            activeCollection = idx;
            log(`Selected collection ${idx}`, 'success');
            document.getElementById('collectionIdx').value = idx;
        }

        async function disconnectAll() {
            for (const d of devices) {
                if (d.opened) {
                    await d.close();
                }
            }
            devices = [];
            activeDevice = null;
            document.getElementById('deviceList').innerHTML = '';
            document.getElementById('collectionsInfo').innerHTML = '';
            log('All devices disconnected', 'info');
        }

        function calculateCRC(data) {
            let crc = 0;
            for (let i = 2; i < 88; i++) {
                crc ^= data[i] || 0;
            }
            return crc;
        }

        function buildRazerCommand(cmdClass, cmdId, dataSize, args) {
            const buffer = new Uint8Array(90);
            buffer[0] = 0x00; // Status
            buffer[1] = Math.floor(Math.random() * 256); // Transaction ID
            buffer[2] = 0x00; // Remaining
            buffer[3] = 0x00; // Protocol
            buffer[4] = 0x00; // Reserved
            buffer[5] = dataSize;
            buffer[6] = cmdClass;
            buffer[7] = cmdId;

            for (let i = 0; i < args.length; i++) {
                buffer[8 + i] = args[i];
            }

            buffer[88] = calculateCRC(buffer);
            buffer[89] = 0x00;

            return buffer;
        }

        async function sendCommand(buffer, reportId = 0) {
            if (!activeDevice || !activeDevice.opened) {
                log('No device connected', 'error');
                return false;
            }

            const hex = Array.from(buffer.slice(0, 20)).map(b => b.toString(16).padStart(2, '0')).join(' ');
            log(`Sending (ReportID=${reportId}): ${hex}...`, 'info');

            // Try different methods
            const methods = [
                { name: 'sendFeatureReport', fn: () => activeDevice.sendFeatureReport(reportId, buffer) },
                { name: 'sendReport', fn: () => activeDevice.sendReport(reportId, buffer) },
            ];

            for (const method of methods) {
                try {
                    await method.fn();
                    log(`SUCCESS with ${method.name}!`, 'success');
                    return true;
                } catch (e) {
                    log(`${method.name} failed: ${e.message}`, 'error');
                }
            }
            return false;
        }

        async function quickSetDPI(dpi) {
            const reportId = parseInt(document.getElementById('reportId').value) || 0;

            log(`Quick setting DPI to ${dpi}...`, 'warn');

            // Build DPI command: Class 0x04, ID 0x06, Size 0x0A
            const dpiHi = (dpi >> 8) & 0xFF;
            const dpiLo = dpi & 0xFF;
            const args = [0x01, 0x01, 0x01, 0x00, dpiHi, dpiLo, dpiHi, dpiLo, 0x00, 0x00];
            const cmd = buildRazerCommand(0x04, 0x06, 0x0A, args);

            await sendCommand(cmd, reportId);
        }

        async function testAllReportIds() {
            if (!activeDevice) {
                log('No device connected', 'error');
                return;
            }

            log('Brute forcing Report IDs 0-10...', 'warn');

            const cmd = buildRazerCommand(0x04, 0x06, 0x0A,
                [0x01, 0x01, 0x01, 0x00, 0x03, 0x20, 0x03, 0x20, 0x00, 0x00]); // DPI 800

            for (let rid = 0; rid <= 10; rid++) {
                log(`Testing Report ID ${rid}...`, 'info');
                try {
                    await activeDevice.sendFeatureReport(rid, cmd);
                    log(`Report ID ${rid} - sendFeatureReport SUCCESS!`, 'success');
                } catch (e) {
                    log(`Report ID ${rid} - Feature failed: ${e.message.substring(0, 50)}`, 'error');
                }

                try {
                    await activeDevice.sendReport(rid, cmd);
                    log(`Report ID ${rid} - sendReport SUCCESS!`, 'success');
                } catch (e) {
                    // Silent fail for output
                }

                await new Promise(r => setTimeout(r, 100));
            }

            log('Brute force complete', 'warn');
        }

        function loadPreset(name) {
            const presets = {
                'dpi1000': '00 00 00 00 00 0a 04 06 01 01 01 00 03 e8 03 e8 00 00',
                'dpi400':  '00 00 00 00 00 0a 04 06 01 01 01 00 01 90 01 90 00 00',
                'poll1000': '00 00 00 00 00 02 00 40 01 08',
                'poll8000': '00 00 00 00 00 02 00 40 01 40',
            };
            document.getElementById('rawCmd').value = presets[name] || '';
        }

        async function sendRawCommand() {
            const hex = document.getElementById('rawCmd').value.trim();
            const bytes = hex.split(/\s+/).map(h => parseInt(h, 16));

            // Pad to 90 bytes
            while (bytes.length < 90) bytes.push(0);
            const buffer = new Uint8Array(bytes);

            // Recalculate CRC
            buffer[88] = calculateCRC(buffer);

            const reportId = parseInt(document.getElementById('reportId').value) || 0;
            await sendCommand(buffer, reportId);
        }

        async function sendAsOutput() {
            if (!activeDevice) {
                log('No device connected', 'error');
                return;
            }

            const hex = document.getElementById('rawCmd').value.trim();
            const bytes = hex.split(/\s+/).map(h => parseInt(h, 16));
            while (bytes.length < 90) bytes.push(0);
            const buffer = new Uint8Array(bytes);
            buffer[88] = calculateCRC(buffer);

            const reportId = parseInt(document.getElementById('reportId').value) || 0;

            try {
                await activeDevice.sendReport(reportId, buffer);
                log(`sendReport (Output) success!`, 'success');
            } catch (e) {
                log(`sendReport failed: ${e.message}`, 'error');
            }
        }

        // Check WebHID support
        if (!navigator.hid) {
            log('WebHID not supported! Use Chrome/Edge.', 'error');
        } else {
            log('WebHID supported. Click "Scan All Razer Devices" to start.', 'success');
        }
    </script>
</body>
</html>
