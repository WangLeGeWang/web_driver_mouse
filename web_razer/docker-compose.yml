version: '3.8'

services:
  razer-webhid:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: razer-webhid-driver
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/status', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: HTTPS version with self-signed certificates
  razer-webhid-https:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: razer-webhid-driver-https
    ports:
      - "3443:3443"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HTTPS_PORT=3443
    volumes:
      - ./certs:/app/certs:ro
    restart: unless-stopped
    profiles:
      - https
