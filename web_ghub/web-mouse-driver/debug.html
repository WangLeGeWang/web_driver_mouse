<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HID 抓包调试 - PRO X SUPERLIGHT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Consolas', 'Monaco', monospace;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #00d4ff; margin-bottom: 20px; }
    .panel {
      background: #16213e;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .panel h2 { color: #00d4ff; font-size: 16px; margin-bottom: 10px; }
    .btn {
      background: #0f3460;
      color: #fff;
      border: 1px solid #00d4ff;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .btn:hover { background: #00d4ff; color: #000; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { border-color: #ff4757; }
    .btn-danger:hover { background: #ff4757; }
    .btn-success { border-color: #2ed573; }
    .btn-success:hover { background: #2ed573; }
    .status { padding: 10px; border-radius: 4px; margin-bottom: 10px; }
    .status.connected { background: rgba(46, 213, 115, 0.2); color: #2ed573; }
    .status.disconnected { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
    .device-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
    .info-box { background: #0f3460; padding: 10px; border-radius: 4px; }
    .info-box label { color: #888; font-size: 12px; }
    .info-box span { display: block; font-size: 14px; color: #00d4ff; }
    .packet-log {
      background: #0d0d1a;
      border-radius: 4px;
      padding: 10px;
      height: 300px;
      overflow-y: auto;
      font-size: 12px;
    }
    .packet { padding: 4px 8px; border-bottom: 1px solid #222; }
    .packet.in { color: #2ed573; }
    .packet.out { color: #ffa502; }
    .packet .time { color: #666; margin-right: 10px; }
    .packet .report-id { color: #00d4ff; margin-right: 10px; }
    .input-group { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .input-group input, .input-group select {
      background: #0f3460;
      border: 1px solid #333;
      color: #fff;
      padding: 8px;
      border-radius: 4px;
    }
    .input-group input { flex: 1; min-width: 200px; }
    .collections { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .collection {
      background: #0f3460;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
    }
    .collection .usage { color: #00d4ff; }
    .quick-cmds { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .quick-cmds button { font-size: 12px; padding: 5px 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔬 HID 抓包调试 - Logitech PRO X SUPERLIGHT</h1>

    <!-- 连接面板 -->
    <div class="panel">
      <h2>📡 设备连接</h2>
      <div class="status disconnected" id="status">未连接</div>
      <button class="btn btn-success" id="btn-connect">连接设备</button>
      <button class="btn btn-danger" id="btn-disconnect" disabled>断开连接</button>
      <button class="btn" id="btn-scan">扫描 Report IDs</button>

      <div class="device-info" id="device-info" style="display: none;">
        <div class="info-box">
          <label>设备名称</label>
          <span id="dev-name">-</span>
        </div>
        <div class="info-box">
          <label>Vendor ID</label>
          <span id="dev-vid">-</span>
        </div>
        <div class="info-box">
          <label>Product ID</label>
          <span id="dev-pid">-</span>
        </div>
      </div>

      <div id="collections-container" style="display: none;">
        <h3 style="color: #888; font-size: 14px; margin-top: 15px;">HID Collections:</h3>
        <div class="collections" id="collections"></div>
      </div>
    </div>

    <!-- 发送命令面板 -->
    <div class="panel">
      <h2>📤 发送命令</h2>
      <div class="input-group">
        <select id="report-type">
          <option value="feature">Feature Report</option>
          <option value="output">Output Report</option>
        </select>
        <input type="text" id="report-id" placeholder="Report ID (例如: 0x10 或 16)" value="0x10">
        <input type="text" id="report-data" placeholder="数据 (例如: 00 01 02 03 或 0,1,2,3)" style="flex: 2;">
        <button class="btn btn-success" id="btn-send">发送</button>
      </div>

      <div class="quick-cmds">
        <strong style="color: #888; margin-right: 10px;">快速命令:</strong>
        <button class="btn" data-cmd="10|00 00 00 00 00 00 00">读取 0x10</button>
        <button class="btn" data-cmd="11|00 00 00 00 00 00 00">读取 0x11</button>
        <button class="btn" data-cmd="20|00 00 00 00 00 00 00">读取 0x20</button>
        <button class="btn" data-cmd="06|00 00 00 00 00 00 00">读取 0x06</button>
      </div>
    </div>

    <!-- 抓包日志 -->
    <div class="panel">
      <h2>📋 抓包日志</h2>
      <button class="btn" id="btn-clear">清空日志</button>
      <button class="btn" id="btn-export">导出 JSON</button>
      <div class="packet-log" id="packet-log">
        <div class="packet" style="color: #666;">等待连接设备...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { HIDDebugger } from '/src/protocols/hid-debug.ts';

    const debugger_ = new HIDDebugger();
    let connected = false;

    // DOM 元素
    const statusEl = document.getElementById('status');
    const btnConnect = document.getElementById('btn-connect');
    const btnDisconnect = document.getElementById('btn-disconnect');
    const btnScan = document.getElementById('btn-scan');
    const btnSend = document.getElementById('btn-send');
    const btnClear = document.getElementById('btn-clear');
    const btnExport = document.getElementById('btn-export');
    const packetLog = document.getElementById('packet-log');
    const deviceInfo = document.getElementById('device-info');
    const collectionsContainer = document.getElementById('collections-container');

    // 更新状态
    function updateStatus(isConnected, message) {
      connected = isConnected;
      statusEl.textContent = message;
      statusEl.className = `status ${isConnected ? 'connected' : 'disconnected'}`;
      btnConnect.disabled = isConnected;
      btnDisconnect.disabled = !isConnected;
      btnScan.disabled = !isConnected;
      btnSend.disabled = !isConnected;
    }

    // 添加日志
    function addLog(direction, reportId, data, error = false) {
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.className = `packet ${direction}`;
      if (error) div.style.color = '#ff4757';
      div.innerHTML = `
        <span class="time">[${time}]</span>
        <span class="report-id">${direction.toUpperCase()} Report 0x${reportId.toString(16).toUpperCase().padStart(2, '0')}</span>
        <span class="data">${data}</span>
      `;
      packetLog.appendChild(div);
      packetLog.scrollTop = packetLog.scrollHeight;
    }

    // 连接设备
    btnConnect.addEventListener('click', async () => {
      updateStatus(false, '正在连接...');
      const result = await debugger_.connect();

      if (result.success) {
        const device = result.device;
        updateStatus(true, `已连接: ${device.productName || '未知设备'}`);

        // 显示设备信息
        document.getElementById('dev-name').textContent = device.productName || '未知设备';
        document.getElementById('dev-vid').textContent = `0x${device.vendorId.toString(16).toUpperCase().padStart(4, '0')}`;
        document.getElementById('dev-pid').textContent = `0x${device.productId.toString(16).toUpperCase().padStart(4, '0')}`;
        deviceInfo.style.display = 'grid';

        // 显示 Collections
        const collections = device.collections;
        if (collections.length > 0) {
          document.getElementById('collections').innerHTML = collections.map(c => `
            <div class="collection">
              <span class="usage">Usage: 0x${c.usage.toString(16).toUpperCase()}</span> |
              Page: 0x${c.usagePage.toString(16).toUpperCase()} |
              Reports: ${c.inputReports?.length || 0} in, ${c.outputReports?.length || 0} out, ${c.featureReports?.length || 0} feature
            </div>
          `).join('');
          collectionsContainer.style.display = 'block';
        }

        // 监听数据包
        debugger_.onPacket((packet) => {
          addLog(packet.direction, packet.reportId, packet.dataHex);
        });

        packetLog.innerHTML = '<div class="packet" style="color: #2ed573;">设备已连接，等待数据...</div>';
      } else {
        updateStatus(false, `连接失败: ${result.error}`);
      }
    });

    // 断开连接
    btnDisconnect.addEventListener('click', async () => {
      await debugger_.disconnect();
      updateStatus(false, '已断开连接');
      deviceInfo.style.display = 'none';
      collectionsContainer.style.display = 'none';
    });

    // 扫描 Report IDs
    btnScan.addEventListener('click', async () => {
      addLog('out', 0, '开始扫描 Report IDs...');
      const results = await debugger_.scanReportIds();
      addLog('in', 0, `扫描完成，找到 ${results.length} 个有效 Report`);
      results.forEach(r => {
        addLog('in', r.reportId, r.data);
      });
    });

    // 解析输入
    function parseHex(str) {
      str = str.trim();
      if (str.startsWith('0x')) {
        return parseInt(str, 16);
      }
      return parseInt(str, 10);
    }

    function parseData(str) {
      str = str.trim();
      if (!str) return [];

      // 支持 "00 01 02" 或 "0,1,2" 格式
      if (str.includes(' ')) {
        return str.split(/\s+/).map(s => parseInt(s, 16));
      } else if (str.includes(',')) {
        return str.split(',').map(s => parseHex(s.trim()));
      } else {
        return str.match(/.{1,2}/g)?.map(s => parseInt(s, 16)) || [];
      }
    }

    // 发送命令
    btnSend.addEventListener('click', async () => {
      const reportType = document.getElementById('report-type').value;
      const reportId = parseHex(document.getElementById('report-id').value);
      const data = parseData(document.getElementById('report-data').value);

      try {
        if (reportType === 'feature') {
          await debugger_.sendFeatureReport(reportId, data);
          // 尝试读取响应
          setTimeout(async () => {
            try {
              await debugger_.receiveFeatureReport(reportId);
            } catch (e) {}
          }, 100);
        } else {
          await debugger_.sendOutputReport(reportId, data);
        }
      } catch (error) {
        addLog('out', reportId, `错误: ${error}`, true);
      }
    });

    // 快速命令
    document.querySelectorAll('[data-cmd]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const [reportId, data] = btn.dataset.cmd.split('|');
        document.getElementById('report-id').value = `0x${reportId}`;
        document.getElementById('report-data').value = data;

        try {
          await debugger_.receiveFeatureReport(parseInt(reportId, 16));
        } catch (e) {
          addLog('in', parseInt(reportId, 16), `错误: ${e}`, true);
        }
      });
    });

    // 清空日志
    btnClear.addEventListener('click', () => {
      debugger_.clearPackets();
      packetLog.innerHTML = '<div class="packet" style="color: #666;">日志已清空</div>';
    });

    // 导出
    btnExport.addEventListener('click', () => {
      const json = debugger_.exportPackets();
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `hid-capture-${Date.now()}.json`;
      a.click();
    });
  </script>
</body>
</html>
